<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <style>
        /* Styling untuk navbar */
        .navbar {
            background-color: #0f233a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 35px;
        }

        /* Styling untuk bagian kiri (logo) */
        .navbar-left {
            flex: 1;
        }

        /* Styling untuk bagian tengah (judul) */
        .navbar-center {
            flex: 2;
            text-align: center;
        }

        .navbar-center h1 {
            color: white;
            font-size: 1.5em;
            margin: 0;
            transition: transform 0.2s ease-in-out;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .navbar-center h1:hover {
            transform: scale(1.1);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        /* Styling untuk bagian kanan (tombol login) */
        .navbar-right {
            flex: 1;
            text-align: right;
        }

        /* Styling untuk tombol login */
        .login-button {
            background-color: #333;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1em;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .login-button:hover {
            background-color: #555;
        }

        /* Styling untuk gambar di navbar */
        .navbar-icon {
            width: 24px;
            height: 24px;
            vertical-align: middle;
            transition: transform 0.2s ease-in-out;
        }

        .navbar-icon:hover {
            transform: scale(1.1);
        }

        /* Styling untuk form profile */
        form {
            margin: 20px auto;
            padding: 40px;
            border: 2px solid #ccc;
            border-radius: 15px;
            width: 400px;
            text-align: center; /* Mengatur teks dan elemen di dalam form ke tengah */
            background-color: #fff;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        label {
            font-size: 1.1em;
            color: #333;
            width: 80px;
            margin-right: 10px;
        }

        input[type="text"],
        input[type="email"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1em;
        }

        .submit-button {
            background-color: #333;
            color: white;
            padding: 12px 25px; /* Mengatur padding tombol */
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.5em; /* Mengatur ukuran teks */
            margin-top: 20px; /* Memberikan jarak antara textbox dan tombol */
            width: auto; /* Mengatur lebar tombol agar sesuai dengan teks */
        }

        .submit-button:hover {
            background-color: #555;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <!-- Logo Profile di sebelah kiri -->
        <div class="navbar-left">
            <a href="profile.html"><img src="Profile.png" alt="Profile" class="navbar-icon"></a>
        </div>

        <!-- Judul di tengah -->
        <div class="navbar-center">
            <h1><a href="index.html" style="color: white; text-decoration: none;">Homepage</a></h1>
        </div>

        <!-- Tombol "Login" di sebelah kanan -->
        <div class="navbar-right">
            <a href="login.html" class="login-button">Login</a>
        </div>
    </div>

    <!-- Form Profile -->
    <form id="profileForm" action="connection_profile.php?redirect=display_profile.php" method="POST">
        <h1 style="text-align: center; margin-top: 0;">Profile</h1>
        <div class="form-group">
            <label for="name">Nama :</label>
            <input type="text" id="nama" name="nama" required />
        </div>
        <div class="form-group">
            <label for="email">Email :</label>
            <input type="email" id="email" name="email" required />
        </div>
        <button type="submit" class="submit-button">Submit</button>
    </form>
</body>
</html>
